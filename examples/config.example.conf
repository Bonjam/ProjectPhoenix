# Project Phoenix Example Configuration
# Copy this file to config.conf and edit it for your own system.
#
# IMPORTANT:
# Never commit your real config.conf to Git.
# It may contain private hostnames, IP addresses, usernames, paths, or key locations.

# ------------------------------------------------------------
# Project identity
# ------------------------------------------------------------

PROJECT_NAME="Project Phoenix"
TAGLINE="Rise. Recover. Restore."

# ------------------------------------------------------------
# Source
# ------------------------------------------------------------
# Folder you want Project Phoenix to protect.
#
# Example:
# SOURCE="/volume2/docker/"
# SOURCE="/srv/docker/"
# SOURCE="/home/user/docker/"

SOURCE="/path/to/docker/"

# ------------------------------------------------------------
# Destination
# ------------------------------------------------------------
# Remote backup destination path.
#
# This path should already exist on the backup machine.
#
# Example:
# DESTINATION="/mnt/backups/docker-backup/"

DESTINATION="/path/to/remote/backup/"

# ------------------------------------------------------------
# Backup server
# ------------------------------------------------------------
# Remote machine reachable over SSH.
#
# Examples:
# BACKUP_HOST="192.168.1.50"
# BACKUP_HOST="backup-server.local"
# BACKUP_HOST="example.com"

BACKUP_HOST="192.168.x.x"

# Remote SSH user.
#
# Example:
# BACKUP_USER="backup"
# BACKUP_USER="root"

BACKUP_USER="backup-user"

# ------------------------------------------------------------
# SSH key
# ------------------------------------------------------------
# Path to the private SSH key used for backup.
#
# Example:
# SSH_KEY="/opt/project-phoenix/ssh/id_ed25519"

SSH_KEY="/path/to/ssh/id_ed25519"

# ------------------------------------------------------------
# Project paths
# ------------------------------------------------------------
# Folder where Project Phoenix is installed.

BACKUP_DIR="/path/to/project-phoenix"

# Exclude file used by rsync.

EXCLUDE_FILE="/path/to/project-phoenix/exclude.txt"